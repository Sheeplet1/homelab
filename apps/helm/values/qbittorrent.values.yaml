ingress:
  main:
    enabled: true
    hosts:
      - host: qbittorrent.sheeplet.com
        paths:
          - path: /
            pathType: Prefix

persistence:
  config:
    enabled: true
    retain: true
    storageClass: longhorn
    accessMode: ReadWriteOnce
    size: 1Gi

  downloads:
    enabled: true
    mountPath: /downloads
    storageClass: longhorn
    accessMode: ReadWriteMany
    size: 200Gi

  media:
    enabled: false

addons:
  vpn:
    enabled: true
    type: gluetun
    gluetun:
      image:
        repository: docker.io/qmcgaw/gluetun
        tag: v3.40.0
        pullPolicy: IfNotPresent
    securityContext:
      capabilities:
        add:
          - NET_ADMIN
          - SYS_MODULE
    env:
      - name: VPNSP
        value: protonvpn
      - name: VPN_TYPE
        value: wireguard
      - name: WIREGUARD_PRIVATE_KEY
        value: REPLACEME
