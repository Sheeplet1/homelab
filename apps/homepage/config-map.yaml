apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: default
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: ""
  #settings.yaml: |
  #  providers:
  #    longhorn:
  #      url: https://longhorn.my.network
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: |
    - Developer:
        - Github:
            - abbr: GH
              href: https://github.com/
  services.yaml: |
    - Homelab:
        - Asus Router:
            href: http://192.168.50.1
            description: Asus
            icon: asus-router.png
        - PiHole:
            href: pihole.home/admin
            description: PiHole
            icon: pi-hole.png
        - Grafana:
            href: grafana.sheeplet.com
            description: Grafana
            icon: grafana.png
        - Mainsail:
            href: http://192.168.50.119
            description: 3D Printer
            icon: mainsail.svg

    - Media:
        - YouTube:
            href: https://youtube.com
            description: YouTube
            icon: youtube.png
        - Reddit:
            href: https://reddit.com
            description: Reddit
            icon: reddit.png

    - My Third Group:
        - My Third Service:
            href: http://localhost/
            description: Homepage is 😎
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        backend: resources
        expanded: true
        cpu: true
        memory: true
        network: default
    - search:
        provider: duckduckgo
        target: _blank
  docker.yaml: ""
