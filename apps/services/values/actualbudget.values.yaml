files:
  server: /data/server-files
  user: /data/user-files

ingress:
  enabled: true
  className: nginx-internal
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
  hosts:
    - host: budget.sheeplet.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: actualbudget-tls
      hosts:
        - budget.sheeplet.com

persistence:
  enabled: true
  existingClaim: actualbudget-pvc
