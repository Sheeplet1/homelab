persistence:
  config:
    type: persistentVolumeClaim
    size: 1Gi
    storageClass: longhorn
    accessMode: ReadWriteOnce
    globalMounts:
      - path: /app/config
        readOnly: false
    enabled: true

ingress:
  main:
    enabled: true
    className: nginx-internal
    hosts:
      - host: jellyseerr.sheeplet.com
        paths:
          - path: /
            pathType: Prefix
# probes:
#   startupProbe:
#     initialDelaySeconds: 30

# Enable metrics collection for Prometheus
serviceMonitor:
  main:
    enabled: true
    endpoints:
      - port: http
        scheme: http
        path: /metrics
        interval: 1m
        scrapeTimeout: 10s
